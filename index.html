<style>
  :root {
    --ink: #1a1e24; --ink-muted: #5a6270; --rule: #d8dde4;
    --bg: #f7f8fa; --white: #ffffff;
    --accent: #1a5fa8; --accent-dark: #0e3f72; --accent-light: #e8f0fb;
    --mono: 'Courier New', monospace; --sans: Arial, Helvetica, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--sans); color: var(--ink); background: var(--white); font-size: 15px; line-height: 1.65; }

  nav {
    position: sticky; top: 0; z-index: 100; background: var(--white);
    border-bottom: 1px solid var(--rule); display: flex; align-items: center;
    justify-content: space-between; padding: 0 48px; height: 60px;
  }
  .nav-logo { font-size: 17px; font-weight: 700; letter-spacing: 0.04em; color: var(--ink); text-decoration: none; cursor: pointer; }
  .nav-logo span { color: var(--accent); }
  .nav-links { display: flex; align-items: center; gap: 32px; list-style: none; }
  .nav-links a { text-decoration: none; color: var(--ink-muted); font-size: 13px; letter-spacing: 0.05em; text-transform: uppercase; transition: color 0.15s; cursor: pointer; }
  .nav-links a:hover, .nav-links a.active { color: var(--accent); }
  .lang-toggle { display: flex; border: 1px solid var(--rule); border-radius: 4px; overflow: hidden; margin-left: 24px; }
  .lang-toggle button { padding: 4px 10px; font-size: 12px; font-family: var(--sans); border: none; background: var(--white); color: var(--ink-muted); cursor: pointer; transition: all 0.15s; }
  .lang-toggle button.active { background: var(--accent); color: var(--white); }

  .page { display: none; }
  .page.active { display: block; }

  .hero { background: var(--ink); color: var(--white); padding: 96px 48px 80px; position: relative; overflow: hidden; }
  .hero::before { content: ''; position: absolute; top: -60px; right: -60px; width: 480px; height: 480px; background: radial-gradient(circle, rgba(26,95,168,0.35) 0%, transparent 70%); pointer-events: none; }
  .hero-label { font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em; color: rgba(255,255,255,0.45); text-transform: uppercase; margin-bottom: 20px; }
  .hero-headline { font-size: clamp(32px, 5vw, 54px); font-weight: 700; line-height: 1.15; letter-spacing: -0.01em; max-width: 640px; margin-bottom: 20px; }
  .hero-headline em { font-style: normal; color: #6daef0; }
  .hero-sub { font-size: 16px; color: rgba(255,255,255,0.65); max-width: 520px; margin-bottom: 40px; line-height: 1.7; }
  .hero-cta { display: inline-block; padding: 12px 28px; background: var(--accent); color: var(--white); font-size: 13px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; border-radius: 3px; transition: background 0.15s; cursor: pointer; border: none; font-family: var(--sans); }
  .hero-cta:hover { background: var(--accent-dark); }
  .product-pills { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 56px; padding-top: 40px; border-top: 1px solid rgba(255,255,255,0.1); }
  .pill { padding: 6px 16px; border: 1px solid rgba(255,255,255,0.2); border-radius: 2px; font-size: 12px; letter-spacing: 0.06em; color: rgba(255,255,255,0.6); font-family: var(--mono); }

  .section { padding: 72px 48px; max-width: 1100px; margin: 0 auto; }
  .section-full { padding: 72px 48px; }
  .section-alt { background: var(--bg); }
  .section-label { font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em; color: var(--accent); text-transform: uppercase; margin-bottom: 12px; }
  .section-title { font-size: 28px; font-weight: 700; letter-spacing: -0.01em; margin-bottom: 16px; }
  .section-body { color: var(--ink-muted); max-width: 640px; line-height: 1.75; }

  .product-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--rule); border: 1px solid var(--rule); margin-top: 48px; }
  .product-card { background: var(--white); padding: 32px 28px; }
  .product-card-tag { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; color: var(--accent); text-transform: uppercase; margin-bottom: 10px; }
  .product-card-title { font-size: 18px; font-weight: 700; margin-bottom: 10px; }
  .product-card-body { font-size: 13px; color: var(--ink-muted); line-height: 1.65; }

  /* page header dark bar */
  .page-header { background: var(--ink); padding: 64px 48px 48px; }

  /* about */
  .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 64px; margin-top: 48px; align-items: start; }
  .about-block { margin-bottom: 32px; }
  .about-block h3 { font-size: 15px; font-weight: 700; margin-bottom: 10px; }
  .about-block p { font-size: 14px; color: var(--ink-muted); line-height: 1.75; }

  /* PRODUCT SLIDESHOW */
  .prod-category { border-bottom: 1px solid var(--rule); padding: 56px 48px; max-width: 1100px; margin: 0 auto; }
  .prod-category:last-child { border-bottom: none; }
  .prod-header { display: flex; align-items: baseline; gap: 16px; margin-bottom: 8px; }
  .prod-title { font-size: 22px; font-weight: 700; }
  .prod-desc { color: var(--ink-muted); font-size: 14px; max-width: 680px; margin-bottom: 28px; line-height: 1.7; }

  .slideshow { position: relative; }
  .slide-img-wrap { position: relative; background: var(--bg); border: 1px solid var(--rule); border-radius: 4px; overflow: hidden; }
  .slide-img-wrap img { width: 100%; height: auto; display: block; }
  .slide-label { text-align: center; font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; color: var(--ink-muted); margin-top: 12px; }
  .slide-nav { display: flex; align-items: center; justify-content: center; gap: 16px; margin-top: 16px; }
  .slide-btn { background: none; border: 1px solid var(--rule); border-radius: 3px; padding: 6px 14px; font-size: 18px; cursor: pointer; color: var(--ink-muted); transition: all 0.15s; font-family: var(--sans); }
  .slide-btn:hover { border-color: var(--accent); color: var(--accent); }
  .slide-btn:disabled { opacity: 0.3; cursor: default; }
  .slide-counter { font-family: var(--mono); font-size: 12px; color: var(--ink-muted); letter-spacing: 0.06em; }
  .slide-dots { display: flex; gap: 6px; justify-content: center; margin-top: 10px; flex-wrap: wrap; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--rule); cursor: pointer; transition: background 0.15s; border: none; padding: 0; }
  .dot.active { background: var(--accent); }

  /* contact */
  .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 64px; margin-top: 48px; align-items: start; }
  .contact-info h3 { font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-muted); margin-bottom: 8px; margin-top: 28px; }
  .contact-info h3:first-child { margin-top: 0; }
  .contact-info p, .contact-info a { font-size: 15px; color: var(--ink); text-decoration: none; line-height: 1.7; }
  .contact-info a:hover { color: var(--accent); }
  .nda-note { margin-top: 28px; padding: 16px 20px; background: var(--accent-light); border-left: 3px solid var(--accent); font-size: 13px; color: var(--ink-muted); line-height: 1.6; }
  .contact-form label { display: block; font-size: 12px; font-family: var(--mono); letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-muted); margin-bottom: 6px; margin-top: 20px; }
  .contact-form label:first-child { margin-top: 0; }
  .contact-form input, .contact-form select, .contact-form textarea { width: 100%; padding: 10px 12px; border: 1px solid var(--rule); border-radius: 3px; font-size: 14px; font-family: var(--sans); color: var(--ink); background: var(--white); outline: none; transition: border-color 0.15s; }
  .contact-form input:focus, .contact-form select:focus, .contact-form textarea:focus { border-color: var(--accent); }
  .contact-form textarea { height: 120px; resize: vertical; }
  .contact-form button { margin-top: 20px; width: 100%; padding: 12px; background: var(--accent); color: var(--white); border: none; font-size: 13px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; font-family: var(--sans); border-radius: 3px; cursor: pointer; transition: background 0.15s; }
  .contact-form button:hover { background: var(--accent-dark); }

  footer { background: var(--ink); color: rgba(255,255,255,0.4); padding: 32px 48px; font-size: 12px; display: flex; justify-content: space-between; align-items: center; }
  footer span { color: rgba(255,255,255,0.7); }

  @media (max-width: 768px) {
    nav { padding: 0 16px; }
    .nav-links { gap: 16px; }
    .hero, .section, .section-full, .prod-category, .page-header { padding-left: 20px; padding-right: 20px; }
    .product-grid { grid-template-columns: 1fr; }
    .about-grid, .contact-grid { grid-template-columns: 1fr; gap: 32px; }
    footer { flex-direction: column; gap: 8px; text-align: center; }
  }
</style>
</head>

"assets/img/valve-2.jpg",

const VALVE_EN   = ["Motor Valve — 2U Model", "Motor Valve — 1U Model (A)", "Motor Valve — 1U Model (B)"];
const VALVE_ZH   = ["電動閥 — 2U 型號", "電動閥 — 1U 型號 (A)", "電動閥 — 1U 型號 (B)"];
const PUMP_IMGS  = ["assets/img/pump-1.jpg",
"assets/img/pump-2.jpg",
"assets/img/pump-3.jpg",
"assets/img/pump-4.jpg",
"assets/img/pump-5.jpg",
"assets/img/pump-6.jpg"];
const PUMP_EN    = ["8U Pump — CDU In-Row", "5U Pump — CDU In-Rack", "4U Pump — CDU In-Rack", "1U Pump (A) — Close-Loop", "1U Pump (B) — Close-Loop", "Micro Pump — NB / DT / Robot"];
const PUMP_ZH    = ["8U 泵浦 — CDU 列式", "5U 泵浦 — CDU 機架式", "4U 泵浦 — CDU 機架式", "1U 泵浦 (A) — 閉迴路", "1U 泵浦 (B) — 閉迴路", "Micro 泵浦 — 筆電/桌機/機器人"];
const MOTOR_IMGS = ["assets/img/motor-1.jpg",
"assets/img/motor-2.jpg",
"assets/img/motor-3.jpg",
"assets/img/motor-4.jpg",
"assets/img/motor-5.jpg",
"assets/img/motor-6.jpg",
"assets/img/motor-7.jpg",
"assets/img/motor-8.jpg",
"assets/img/motor-9.jpg",
"assets/img/motor-10.jpg",
"assets/img/motor-11.jpg",
"assets/img/motor-12.jpg"];
const MOTOR_EN   = ["BLDC Motor — Gimbal", "BLDC Motor — Drone (Agriculture)", "Lead Screw Motor — Energy Storage", "BLDC Motor — UAV", "BLDC Motor — Screw Conveyor", "BLDC Motor — Headrest", "BLDC Motor — Slide Way", "BLDC Motor — Highly Integrated", "BLDC Motor — Frameless", "Stepper Motor — Automotive / Rotation", "Stepper Motor — DMS / OMS", "Stepper Motor — Automotive HVAC"];
const MOTOR_ZH   = ["BLDC 馬達 — 雲台", "BLDC 馬達 — 農業無人機", "導螺桿馬達 — 儲能系統", "BLDC 馬達 — 無人機", "BLDC 馬達 — 螺旋輸送", "BLDC 馬達 — 頭枕", "BLDC 馬達 — 滑軌", "BLDC 馬達 — 高整合型", "BLDC 馬達 — 無框型", "步進馬達 — 汽車/旋轉台", "步進馬達 — DMS/OMS", "步進馬達 — 汽車 HVAC"];

let currentLang = 'en';
const slideshows = {};

function makeSlideshow(containerId, imgs, labelsEn, labelsZh) {
  const state = { idx: 0, imgs, labelsEn, labelsZh };
  slideshows[containerId] = state;

  const wrap = document.getElementById(containerId);
  wrap.innerHTML = `
    <div class="slide-img-wrap">
      <img id="${containerId}-img" src="${imgs[0]}" alt="">
    </div>
    <div class="slide-label" id="${containerId}-label">${labelsEn[0]}</div>
    <div class="slide-nav">
      <button class="slide-btn" id="${containerId}-prev" onclick="slideStep('${containerId}',-1)">&#8592;</button>
      <span class="slide-counter" id="${containerId}-counter">1 / ${imgs.length}</span>
      <button class="slide-btn" id="${containerId}-next" onclick="slideStep('${containerId}',1)">&#8594;</button>
    </div>
    <div class="slide-dots" id="${containerId}-dots"></div>
  `;

  const dotsEl = document.getElementById(containerId + '-dots');
  imgs.forEach((_, i) => {
    const d = document.createElement('button');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    d.onclick = () => goSlide(containerId, i);
    dotsEl.appendChild(d);
  });
  updateSlideButtons(containerId);
}

function goSlide(id, idx) {
  const s = slideshows[id];
  s.idx = idx;
  document.getElementById(id + '-img').src = s.imgs[idx];
  const labels = currentLang === 'zh' ? s.labelsZh : s.labelsEn;
  document.getElementById(id + '-label').textContent = labels[idx];
  document.getElementById(id + '-counter').textContent = (idx+1) + ' / ' + s.imgs.length;
  document.querySelectorAll('#' + id + '-dots .dot').forEach((d,i) => d.classList.toggle('active', i===idx));
  updateSlideButtons(id);
}

function slideStep(id, dir) {
  const s = slideshows[id];
  const newIdx = Math.max(0, Math.min(s.imgs.length - 1, s.idx + dir));
  goSlide(id, newIdx);
}

function updateSlideButtons(id) {
  const s = slideshows[id];
  document.getElementById(id+'-prev').disabled = s.idx === 0;
  document.getElementById(id+'-next').disabled = s.idx === s.imgs.length - 1;
}

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
  const navEl = document.getElementById('nav-' + id);
  if (navEl) navEl.classList.add('active');
  window.scrollTo(0, 0);
}

function setLang(lang) {
  currentLang = lang;
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  document.getElementById('btn-zh').classList.toggle('active', lang === 'zh');
  applyLang();
  // Update all slideshow labels to current slide
  Object.keys(slideshows).forEach(id => {
    const s = slideshows[id];
    const labels = lang === 'zh' ? s.labelsZh : s.labelsEn;
    const el = document.getElementById(id + '-label');
    if (el) el.textContent = labels[s.idx];
  });
}

function applyLang() {
  document.querySelectorAll('[data-en]').forEach(el => {
    const text = el.getAttribute('data-' + currentLang);
    if (text !== null) el.innerHTML = text;
  });
  document.querySelectorAll('select option').forEach(opt => {
    const text = opt.getAttribute('data-' + currentLang);
    if (text) opt.textContent = text;
  });
  const navLabels = {
    en: { home:'Home', about:'About', products:'Products', contact:'Contact' },
    zh: { home:'首頁', about:'關於我們', products:'產品', contact:'聯絡我們' }
  };
  Object.entries(navLabels[currentLang]).forEach(([id, label]) => {
    const el = document.getElementById('nav-' + id);
    if (el) el.textContent = label;
  });
}

function submitForm() {
  const msg = currentLang === 'zh'
    ? '感謝您的來信，我們將盡快回覆。'
    : 'Thank you for your message. We will be in touch shortly.';
  alert(msg);
}

// Init slideshows
makeSlideshow('ss-valve', VALVE_IMGS, VALVE_EN, VALVE_ZH);
makeSlideshow('ss-pump',  PUMP_IMGS,  PUMP_EN,  PUMP_ZH);
makeSlideshow('ss-motor', MOTOR_IMGS, MOTOR_EN, MOTOR_ZH);

// Init nav
document.getElementById('nav-home').classList.add('active');
applyLang();
</script>
